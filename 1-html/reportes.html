<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Reportes</title>
</head>
<body>


    <!--===== NAVBAR =====-->
    <header>
        <div>Logo</div>

        <nav>
            <!--SE NECESITA MODIFICAR ESTA PARTE-->
            <a href="html.html">Inicio</a>
            <a href="mapa.html">Mapa</a>
            <a href="#">Perfil</a>
        </nav>
    </header>
    
    <!-- ===== CONTENIDO PRINCIPAL =====-->
    <main>

        <h1>Crear Nuevo Reporte</h1>

        <section>

            <!-- ===== FORMULARIO ===== -->
            <form>

                <!-- Tipo -->
                <label for="tipo">Tipo de problema</label><br>
                <select id="tipo" name="tipo">
                    <option value="">Seleccione una opción</option>
                    <option value="hueco">Hueco</option>
                    <option value="basura">Basura</option>
                    <option value="semaforo">Semáforo</option>
                    <option value="alumbrado">Alumbrado</option>
                </select><br><br>

                <!-- DESCRIPCIÓN-->
                <label for="descripcion">Descripción</label><br>
                <textarea id="descripcion" name="descripcion" rows="4" cols="50" placeholder="Describe el problema..."></textarea><br><br>

                <!-- Provincia -->
                <label for="provincia">Provincia</label><br>
                <select id="provincia" name="provincia">
                    <option value="">Seleccione</option>
                    <option>San José</option>
                    <option>Alajuela</option>
                    <option>Heredia</option>
                    <option>Cartago</option>
                    <option>Guanacaste</option>
                    <option>Puntarenas</option>
                    <option>Limón</option>
                </select><br><br>

                <!-- Cantón -->
                <label for="canton">Cantón</label><br>
                <select id="canton" name="canton">
                    <option value="">Seleccione</option>
                </select><br><br>

                <!-- Dirección -->
                <label for="direccion">Dirección</label><br><br>
                <input type="text" id="direccion" name="direccion" placeholder="ubicación exacta"><br><br>

                <!-- Imagen -->
                <label for="imagen">Subir Imagen</label><br>
                <input type="file" id="imagen" name="imagen"><br><br>

                <!-- Botón -->
                <button type="submit">Enviar Reporte</button>

            </form>
            <!-- ===== MAPA (SIMULADO) ===== -->
            <aside>
                <p>Aquí irá el mapa</p>
            </aside>

        </section>

    </main>

</body>
</html>
