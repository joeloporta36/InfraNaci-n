<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Panel de Administrador</title>

        <style>
            body{
                font-family: Arial, sans-serif;
                margin: 0;
                background: #f5f5f5;
            }
            /* NAVBAR */
            .navbar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 12px 30px;
                background: #e9e9e9;
                border-bottom: 1px solid #ccc;
            }
            .navbar .logo {
                font-weight: bold;
            }
            .navbar a {
                margin-left: 20px;
                text-decoration: none;
                color: black;
                font-size: 14px;
            }
            /* CONTENEDOR */
            .container {
                padding-bottom: 25px;
            }
            h2 {
                margin-bottom: 20px;
            }
            /* CARDS */
            .card {
                flex: 1;
                background: white;
                border: 1px solid #ccc;
                padding: 15px;
                text-align: center;
            }
            .card p {
                margin: 0;
                font-size: 14px;
            }
            .card h3 {
                margin-top: 10px;
                font-size: 22px;
            }
            /* FILTROS */
            .filtros {
                margin-bottom: 15px;
                font-size: 14px;
            }
            .filtros span {
                margin-right: 10px;
            }
            .filtros a {
                margin: 0 5px;
                text-decoration: none;
                color: black;
                font-weight: bold;
            }
            /* TABLA */
            table {
                width: 100px;
                border-collapse: collapse;
                background: white;
            }
            th,td {
                border: 1px solid #ccc;
                padding: 10px;
                text-align: center;
                font-size: 14px;
            }
            th {
                background: #e9e9e9;
            }
            /* BOTÓN */
            button {
            padding: 5px 10px;
            border: 1px solid #333;
            background: white;
            cursor: pointer;
            }

            button:hover {
            background: #ddd;
            }

            /* COLORES DE ESTADO */
            .pendiente {
            color: red;
            font-weight: bold;
            }

            .revision {
            color: orange;
            font-weight: bold;
            }

            .resuelto {
            color: green;
            font-weight: bold;
            }
        </style>

    </head>
    <body>

<header class="navbar">
    <div class="logo">Logo</div>
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Mapa</a>
        <a href="#">Perfil</a>
    </nav>
</header>

<main class="container">

    <h2>Panel de Administrador</h2>

    <!-- CARDS -->
    <section class="cards">
        <div class="card">
            <p>Total Reportes</p>
            <h3>45</h3>
        </div>
        <div class="card">
            <p>Pendientes</p>
            <h3>20</h3>
        </div>
        <div class="card">
            <p>En Revisión</p>
            <h3>15</h3>
        </div>
        <div class="card">
            <p>Resueltos</p>
            <h3>10</h3>
        </div>
    </section>

    <!-- FILTROS -->
    <div class="filtros">
        <span>Filtrar:</span>
        <a href="#">Tipo</a> |
        <a href="#">Estado</a> |
        <a href="#">Cantón</a>
    </div>

    <!-- TABLA -->
    <table>
        <thead>
            <tr>
                <th>Tipo</th>
                <th>Lugar</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Hueco</td>
                <td>San José</td>
                <td>Hoy</td>
                <td class="pendiente">Pendiente</td>
                <td><button>Editar</button></td>
            </tr>
            <tr>
                <td>Basura</td>
                <td>Heredia</td>
                <td>Hoy</td>
                <td class="revision">Revisión</td>
                <td><button>Editar</button></td>
            </tr>
            <tr>
                <td>Semáforo</td>
                <td>Alajuela</td>
                <td>Hoy</td>
                <td class="resuelto">Resuelto</td>
                <td><button>Editar</button></td>
            </tr>
        </tbody>
    </table>

</main>

</body>
</html>
