<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Usuario | InfraNación</title>
</head>
<body>
    <section class="login-usuario-container">
        <section class="login-box">
            <div class="logo-loguin">
                <h2>InfraNación</h2>
                <img src="/4-img/logo.png" alt="">
            </div>
            <form id="form-usuario">
                <!--Correo de usuario-->
                <label for="correo">Correo electronico</label>
                <input type="email" id="correo" placeholder="correo@gmail.com" required>

                <!--Contraseña de usuario-->
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
                
                <!--boton-->
                <button type="submit">Ingresar</button>
            </form>

        </section>

    </section>
</body>
</html>
