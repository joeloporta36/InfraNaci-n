<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Usuario | InfraNación</title>
    <link rel="stylesheet" href="/public/css/loguinusuario.css">
</head>
<body>
    <section class="login-usuario-container">
        <section class="login-box">
            <div class="logo-loguin">
                <img src="/public/img/logo.png" alt="">
                <h2>InfraNación</h2>
                
            </div>
            <form id="form-usuario">
                <h3>Iniciar Sesión</h3>
                <!--Correo de usuario-->
                <label for="correo">Correo electronico</label>
                <input type="email" id="correo" placeholder="correo@gmail.com" name="correo" required>

                <!--Contraseña de usuario-->
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="ingrese su contraseña" name="password">
                
                <!--boton-->
                <button type="submit">Ingresar</button>
            </form>
            <div class="enlaces">
                <a href="#">¿Has olvidado tu contraseña?</a>

                <p>¿Aun no tienes una cuenta? <a href="#">Registrate aquí!</a></p>
            </div>
            

        </section>

    </section>
</body>
</html>
